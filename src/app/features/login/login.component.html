<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <img src="./assets/images/logo-domus-reg-v.png" alt="ERP DomusReg" height="100" />
    </div>
    <h1>Accedi a ERP DomusReg</h1>
    <p class="subtitle">Inserisci le tue credenziali per continuare</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" autocomplete="username" autofocus />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Attendere...' : 'Accedi' }}
      </button>
    </form>
  </div>
</div>
