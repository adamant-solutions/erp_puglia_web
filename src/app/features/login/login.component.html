<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <img
        src="./assets/images/logo-domus-reg-h.png"
        alt="ERP DomusReg - Regione Puglia"
      />
    </div>
    <h1>Accedi alla piattaforma</h1>
    <p class="subtitle" id="login-subtitle">Inserisci le tue credenziali per continuare</p>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      novalidate
      aria-labelledby="login-subtitle"
    >
      <div class="login-field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          autocomplete="username"
          autofocus
          required
          aria-required="true"
          [attr.aria-invalid]="form.controls.username.invalid && form.controls.username.touched ? 'true' : null"
        />
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          required
          aria-required="true"
          [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched ? 'true' : null"
          [attr.aria-describedby]="errorMessage ? 'login-error' : null"
        />
      </div>

      <div
        *ngIf="errorMessage"
        id="login-error"
        class="error"
        role="alert"
        aria-live="assertive"
      >
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="form.invalid || loading">
        <span *ngIf="loading" class="visually-hidden">Accesso in corso, </span>
        {{ loading ? 'Attendere...' : 'Accedi' }}
      </button>
    </form>

    <div class="text-center mt-4">
      <span class="text-muted d-block mb-2">oppure</span>
      <a href="/saml2/authenticate/iam" class="btn btn-outline-primary w-100">
        Accedi con IAM Puglia (SPID / CIE / CNS / eIDAS)
      </a>
    </div>
  </div>
</div>
