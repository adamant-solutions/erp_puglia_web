<nav class="navbar">
  <div class="navbar__inner">
    <a
      class="navbar-brand"
      [routerLink]="['/']"
      title="ERP Puglia"
      (click)="closeMobile()"
    >
      <img
        src="./assets/images/logo-domus-reg-h.png"
        alt="ERP DomusReg"
      />
    </a>

    <button
      type="button"
      class="nav-toggle"
      [class.is-open]="mobileOpen"
      [attr.aria-expanded]="mobileOpen"
      aria-controls="erp-main-menu"
      aria-label="Apri menu di navigazione"
      (click)="toggleMobile()"
    >
      <span class="nav-toggle__bars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>
</nav>

<div
  class="nav-backdrop"
  [class.is-visible]="mobileOpen"
  (click)="closeMobile()"
  aria-hidden="true"
></div>

<div
  id="erp-main-menu"
  class="main-nav-menu-wrapper"
  [class.is-open]="mobileOpen"
>
  <div class="main-nav-menu-inner">
    <ul class="navbar-nav main-nav-menu" role="menubar">
      <li class="nav-item" role="none">
        <a
          class="nav-link"
          role="menuitem"
          [routerLink]="['/anagrafica']"
          [queryParams]="{ pagina: 0 }"
          [ngClass]="{ active: isCurrentRoute('anagrafica') }"
          (click)="closeMobile()"
        >
          <i class="bi bi-person-vcard" aria-hidden="true"></i>
          <span>Anagrafica</span>
        </a>
      </li>

      <li class="nav-item" role="none">
        <a
          class="nav-link"
          role="menuitem"
          [routerLink]="['/patrimonio']"
          [queryParams]="{ pagina: 0 }"
          [ngClass]="{ active: isCurrentRoute('patrimonio') }"
          (click)="closeMobile()"
        >
          <i class="bi bi-buildings" aria-hidden="true"></i>
          <span>Patrimonio</span>
        </a>
      </li>

      <li class="nav-item" role="none">
        <a
          class="nav-link"
          role="menuitem"
          [routerLink]="['/contratti-locazione']"
          [ngClass]="{ active: isCurrentRoute('contratti-locazione') }"
          (click)="closeMobile()"
        >
          <i class="bi bi-file-earmark-text" aria-hidden="true"></i>
          <span>Contratti locazione</span>
        </a>
      </li>

      <li class="nav-item" role="none">
        <a
          class="nav-link"
          role="menuitem"
          [routerLink]="['/manutenzione']"
          [ngClass]="{ active: isCurrentRoute('manutenzione') }"
          (click)="closeMobile()"
        >
          <i class="bi bi-tools" aria-hidden="true"></i>
          <span>Manutenzione</span>
        </a>
      </li>

      <li class="nav-item" role="none">
        <a
          class="nav-link"
          role="menuitem"
          [routerLink]="['/ripartizione-spese']"
          [ngClass]="{ active: isCurrentRoute('ripartizione-spese') }"
          (click)="closeMobile()"
        >
          <i class="bi bi-pie-chart" aria-hidden="true"></i>
          <span>Ripartizione spese</span>
        </a>
      </li>

      <li class="nav-item" role="none">
        <a
          class="nav-link"
          role="menuitem"
          [routerLink]="['/morosita']"
          [ngClass]="{ active: isCurrentRoute('morosita') }"
          (click)="closeMobile()"
        >
          <i class="bi bi-exclamation-octagon" aria-hidden="true"></i>
          <span>Morosità</span>
        </a>
      </li>

      <li class="nav-item" role="none">
        <a
          class="nav-link"
          role="menuitem"
          [routerLink]="['/contabilita']"
          [ngClass]="{ active: isCurrentRoute('contabilita') }"
          (click)="closeMobile()"
        >
          <i class="bi bi-calculator" aria-hidden="true"></i>
          <span>Contabilità</span>
        </a>
      </li>
    </ul>
  </div>
</div>
